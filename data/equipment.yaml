description: |
  The Sachtler Flowtech 75 is a carbon-fiber tripod system. Unlike traditional tripods with multiple knobs per leg, it uses a single quick-release brake at the top of each leg for instant height adjustment.

sections:
  - title: Setup & Height Adjustment (The Legs)
    images:
      - images/equipment/tripod_sachtler_flow75_legs_1.avif
      - images/equipment/tripod_sachtler_flow75_legs_2.avif
    body: |
      **Deploying the Legs**
      The legs are held together by magnetic clasps. Simply pull them apart to separate.

      **Adjusting Height**
        1. Locate the **Quick Release Brake Levers** at the very top of each leg.
        2. Lift the lever UP to unlock the entire leg (do for all 3 legs).
        3. Raise or lower the tripod to your desired height.
        4. Push the lever DOWN firmly to lock the leg.

  - title: Levelling the Bubble
    images:
      - images/equipment/tripod_sachtler_flow75_bubble_1.avif
      - images/equipment/tripod_sachtler_flow75_bubble_2.avif
    body: |
      • Reach under the bowl and loosen the tie-down knob (the handle hanging below the head).
      • Adjust the head until the bubble is centered.
      • Tighten the knob firmly.

  - title: Mounting the Camera
    images:
      - images/equipment/tripod_sachtler_flow75_mount_1.avif
      - images/equipment/tripod_sachtler_flow75_mount_2.avif
      - images/equipment/tripod_sachtler_flow75_mount_3.avif
    body: |
      1. Loosen the side lock knob.
      2. Slide the camera in from the rear of the mount until a click is heard.
      3. Tighten the side lock knob to secure the camera in place.

  - title: Balancing & Movement
    images:
      - images/equipment/tripod_sachtler_flow75_adjust_1.avif
      - images/equipment/tripod_sachtler_flow75_adjust_2.avif
    body: |
      **Counterbalance**
      • Unlock the tilt brake. Tilt the camera forward/backward.
      • If it falls, adjust the **Counterbalance Knob** until the camera stays stationary at any tilt angle.

      **Pan & Tilt Drag**
      • **Pan (Left/Right):** Locate the drag ring at the base of the head. Increase for more resistance (slower pans), decrease for looser movement.
      • **Tilt (Up/Down):** Locate the drag ring on the side. Adjust similarly.
      • **Brakes:** Always unlock the Pan and Tilt brakes before moving the camera.

  - title: Packing Up
    images: []
    body: |
      1. Loosen the side lock knob.
      2. While holding down the red button, slide the camera out from the rear.
      3. Collapse the legs by lifting the top brake levers and push the legs down.
      4. Bring the legs together. The magnetic clasps will snap them shut automatically.
      5. Ensure all knobs are loosely locked before packing.

