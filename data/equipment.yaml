id: light_aputure_200x_s
name: Aputure Amaran 200X S
brand: Aputure
category: Light
quantity: 1
storage: "Tripod Shelf & Cabinet 4"

coverImages:
  - images/equipment/light_aputure_200x_s_cover.avif

description: |
  A compact 200W COB light with adjustable color temperature (warm to cool) and built-in controls for brightness and color.

sections:
  - title: Main parts
    images: []
    body: |
      **Front (where light comes out):** Bowens mount for attaching modifiers, plus a **protective cover** that should be removed before use.
      **Side:** **Locking handle** and **locking knob / tie-down** used to stop the light from tilting.
      **Back panel:** OLED display, **INT knob** (brightness), **CCT knob** (colour), **power button**, and **Bluetooth reset** pin/key area.
      **Power:** DC input port for the power adapter, and the power brick that can be hung on the stand using the adapter clasp.

  - title: Setting up
    images:
      - images/equipment/light_aputure_200x_s_setup01.avif
      - images/equipment/light_aputure_200x_s_setup02.avif
      - images/equipment/light_aputure_200x_s_setup03.avif
      - images/equipment/light_aputure_200x_s_setup04.avif
      - images/equipment/light_aputure_200x_s_setup05.avif
      - images/equipment/light_aputure_200x_s_setup06.avif
      - images/equipment/light_aputure_200x_s_setup07.avif
    body: |
      **Note:** The light umbrella is stored on the **camera tripod shelf**.

      **1) Set up tripod / light stand**
      Place the tripod on a flat surface and spread the legs fully so it is stable. The L-2800FP tripod is preferred for this light.

      **2) Remove the protective cover**
      Pull the small metal tab/stub (the cover latch) and rotate/pull to remove the protective cover from the front of the light.

      **3) Mount the amaran 200x S onto the stand**
      Tighten the mounting screws/knobs so the light is secure and does not wobble.
      Tighten the tilt/locking handle so the light cannot tilt up or down during use.

      **4) Open the umbrella**
      Open the umbrella and pull the metal ribs until you feel them lock/click into place.

      **5) Close and secure the umbrella's flaps before mounting**
      Close the umbrella flaps and ensure the Velcro straps are firmly attached so it does not spring open while you are mounting it.

      **6) Mount the umbrella into the light**
      Line up the umbrella's fins/connection points with the correct opening on the light, then turn the umbrella clockwise until it clicks and locks.
      This step may take **two people** so one person stabilizes the light while the other turns the umbrella.

      **7) Add the white filter sheet**
      Place the white diffusion/filter sheet over the front of the umbrella so the light output becomes softer.

  - title: Powering the light
    images:
      - images/equipment/light_aputure_200x_s_back.avif
    body: |
      **1) Mount the power adapter**
      Run the power brick's wire through the adapter clasp and hang the brick on the stand bracket so it is not dangling freely.

      **2) Connect power**
      Plug the adapter into the light's **DC input**, then connect the adapter to wall power.

      **3) Turn on/off**
      Press the **power button** to turn the light on or off.

  - title: Setting brightness (INT knob)
    images:
      - images/equipment/light_aputure_200x_s_back.avif
    body: |
      Rotate the **INT** knob to adjust brightness in small steps from **0% to 100%**. The display shows the current brightness as you adjust.

      Quick change option: pressing the INT knob typically jumps through common brightness values (useful when you need fast repeatable levels).

  - title: Setting color temperature (CCT knob)
    images:
      - images/equipment/light_aputure_200x_s_back.avif
    body: |
      Rotate the **CCT** knob to shift the light from warmer to cooler. The amaran 200x S supports approximately **2700K to 6500K** and shows the current value on the display.

      Quick change option: pressing the CCT knob typically jumps through common color values (useful when matching a room quickly).

  - title: Using modifiers (reflector and umbrella hole)
    images: []
    body: |
      **Attaching the reflector (Bowens mount)**
      Align the reflector with the Bowens mount and rotate until it locks. To remove it, hold the release latch and rotate the reflector back out.

      **Umbrella hole**
      The light body includes a soft-light umbrella hole for umbrella-style setups. Insert the umbrella handle into the hole and tighten the locking knob so it does not slip.

      **Important**
      Always remove the protective cover before turning the light on, and reinstall the cover when packing the light away.

  - title: App control and Bluetooth pairing
    images: []
    body: |
      **Sidus Link app control**
      You can connect the light to the Sidus Link app via Bluetooth to adjust brightness and color and to access built-in lighting effects.

      **Bluetooth reset**
      If pairing is not working, press and hold the Bluetooth reset control until the display indicates a reset process, then try pairing again.

  - title: Packing up
    images:
      - images/equipment/light_aputure_200x_s_packup01.avif
      - images/equipment/light_aputure_200x_s_packup02.avif
      - images/equipment/light_aputure_200x_s_packup03.avif
      - images/equipment/light_aputure_200x_s_packup04.avif
    body: |
      **1) Remove the white filter sheet**
      Take off the white filter sheet and place it back into its plastic packaging.

      **2) Remove the umbrella from the light**
      Pull the release tab to unlock, then remove the umbrella from the light.

      **3) Collapse and store the umbrella**
      Push all umbrella tabs, collapse the umbrella, place the white styrofoam on the metal rim, and store it inside the cylindrical bag.

      **4) Remove the amaran light from the stand**
      Loosen the handle and fold the tripod connector to a horizontal position. Put the protective cover back on the front, place the grey styrofoam on the rim, and store the light in the rectangular bag.

related: []
---
id: light_felloni_tecpro_d50ho
name: Dedolight Felloni Tecpro TP-LONI-D50HO
brand: Dedolight
category: Light
quantity: 2
storage: "3"

coverImages:
  - images/equipment/light_felloni_tecpro_d50ho_cover.avif
description: |
  A 1x1 daylight LED panel with built-in dimming, designed for quick setups as a key, fill, or general base light.

sections:
  - title: Main parts
    images:
      - images/equipment/light_felloni_tecpro_d50ho_back.avif
    body: |
      **Power switch (0 / 1):** Turns the light off and on.
      **Dimmer knob:** Adjusts brightness from low to high.
      **DC input (10-16.8V):** Power input for a DC supply.
      **Fuse:** Protects the unit if there is an electrical issue.
      **Battery plate (V-mount):** Lets you power the light with a V-mount battery (if your unit has the plate installed).
      **Yoke and tilt knobs:** Lets you mount and angle the panel on a light stand.

  - title: Mounting to a light stand
    images:
      - images/equipment/light_felloni_tecpro_d50ho_front.avif
    body: |
      **Step 1: Prepare the stand**
      • Fully spread the stand legs until it feels stable.
      • If possible, keep one leg pointing in the same direction as the light (so the weight is supported).

      **Step 2: Attach the panel**
      • Mount the light panel to the top of the stand.
      • Tighten the mount knob until the light cannot rotate freely.

      **Step 3: Angle the light**
      • Loosen both side tilt knobs slightly.
      • Tilt the panel to the angle you want.
      • Re-tighten both tilt knobs firmly.

  - title: Power options
    images:
      - images/equipment/light_felloni_tecpro_d50ho_back.avif
    body: |
      This light is commonly powered in three ways: **AC adapter**, **DC input**, or **V-mount battery** (depending on what accessories your unit has).

      **Option A: AC adapter (most common indoors)**
      • Connect the adapter-s output cable to the light-s **DC input**.
      • Plug the adapter into wall power.
      • Confirm the cable is seated firmly before turning the light on.

      **Option B: DC input (10-16.8V)**
      • Connect a compatible DC source to the **DC input**.
      • Do not force the plug, and make sure the connector is fully inserted.

      **Option C: V-mount battery**
      • Slide the V-mount battery onto the plate until it locks.
      • To remove it, press the battery release and slide it off.
      • If the light does not power on, check the battery charge level and that it is properly latched.

  - title: Turning on and setting brightness
    images:
      - images/equipment/light_felloni_tecpro_d50ho_back.avif
    body: |
      **Power on**
      • Flip the rear **power switch** from **0** (off) to **1** (on).

      **Set brightness**
      • Turn the **dimmer knob** toward **+** to increase brightness.
      • Turn toward **-** to reduce brightness.

      **Best practice**
      • Start dimmer low, then raise it to your working level after the light is aimed.
      • When powering off, turn the dimmer down first, then flip the switch to **0**.

  - title: What the printed numbers mean (quick reference)
    images: []
    body: |
      **5600K:** Daylight color setting for this model.
      **50° beam:** The spread of the light (useful for broad coverage at close range).
      **Power consumption:** This model family is commonly listed as **24W or 50W** depending on version and documentation, so rely on your unit-s label if it differs.
      **DC 10-16.8V (max 5A):** The expected DC input range and current limit.
      **Fuse 5A:** Fuse rating for protection.

  - title: Packing down and storage
    images: []
    body: |
      **Power down**
      • Turn the dimmer down.
      • Flip the power switch to **0**.
      • Unplug wall power or remove the battery.

      **Remove from stand**
      • Support the light with one hand before loosening the stand mount.
      • Loosen the mount knob slowly and lift the light off.

      **Protect the front**
      • If your kit has a front cover or case, use it to protect the LED surface from scratches.
      • Do not stack heavy objects on the front face.

      **Cable care**
      • Coil cables in large loops (not tight coils) to reduce cable stress.
      • Avoid sharp bends near the connector ends.
---
id: light_godox_ml60
name: Godox ML60 II Bi
brand: Godox
category: Light
quantity: 2
storage: "4"

coverImages:
  - images/equipment/light_godox_ml60_cover.avif

description: |
  A compact bi-color COB light with adjustable brightness, adjustable color temperature, built-in FX modes, Bluetooth app control, and multiple power options.

sections:
  - title: Identify the main parts
    images: []
    body: |
      **Display:** Shows the current mode, brightness, color temperature, Bluetooth status, and warnings.
      **FN button:** Used for extra functions such as Bluetooth settings and parameter changes.
      **DIM/MODE button:** Used to switch between lighting modes and adjust settings.
      **DC input port:** Connects the power adapter or battery kit cable to the light.
      **Power switch:** Turns the light on and off.
      **Reflector mount:** Front mount where the reflector and other compatible accessories attach.
      **Thermal vents and fan:** Help cool the light during use, so they must not be blocked.
      **1/4" screw hole:** Mounting point used with the holder/bracket.
      **LED light source:** The front COB area where the light is emitted.

  - title: What comes in the kit
    images: []
    body: |
      The standard kit commonly includes the **light body**, **reflector**, **holder AD-E2**, **lamp head protective cover**, **adapter**, **AC power cord**, **instruction manual**, and **carry bag**.
      Some kits also include a **battery accessory kit**, such as the **AK-B01 NP-F battery kit** or the **AK-B02 V-mount battery kit**, depending on the version.

  - title: Mounting the light
    images: 
      - images/equipment/light_godox_ml60_01.avif
      - images/equipment/light_godox_ml60_03.avif
    body: |
      - Attach the **holder AD-E2** or your mounting bracket securely to the light first.
      - Mount the light onto a light stand and tighten the stand knob firmly so the light does not wobble.
      - Tighten the tilt adjustment handle so the light does not suddenly drop forward or backward.
      - Before switching the light on, make sure the stand legs are fully spread and the setup is stable.

  - title: Protective cover and reflector
    images: []
    body: |
      - Remove the **lamp head protective cover** before turning the light on.
      - To attach the reflector, align it with the front mount, insert it properly, and rotate it until it locks.
      - To remove the reflector, press or release the locking mechanism and rotate it back out.
      - Reinstall the protective cover when packing the light away so the COB area stays protected.

  - title: Using the Godox Collapsible Diffusion Dome AK-R22
    images: 
      - images/equipment/light_godox_ml60_diffuser.avif
    body: |
      The **Godox AK-R22 Collapsible Diffusion Dome** is an optional diffuser that softens the light output and makes shadows less harsh. It is useful when you want a gentler look on faces or when the bare reflector feels too strong. :contentReference[oaicite:0]{index=0}

      **When to use it**
      • Use it for interviews, talking-head videos, or any setup where you want softer light on skin.
      • Use it when the bare reflector creates shadows that look too hard or too contrasty.

      **How to attach it**
      • First, turn the light off and let it cool slightly if it has been running.
      • Remove the reflector or any front accessory that is already attached.
      • Attach the **AK-R22** to the front of the light using the correct compatible mount/adapter for your setup.
      • Check that it is seated securely before turning the light back on.

      **How it changes the light**
      • The light becomes softer and more spread out.
      • Because diffusion reduces intensity, you may need to increase brightness on the light after attaching it.

      **Handling and storage**
      • Collapse it carefully when packing.
      • Keep the diffusion material clean and avoid crushing it under heavy items.
      • Store it dry and flat/collapsed properly so it keeps its shape.

  - title: Powering the light
    images:  
      - images/equipment/light_godox_ml60_02.avif
    body: |
      **AC power:** Connect the adapter to the **DC input port** on the light, then connect the AC power cord to the adapter and wall outlet.
      **Battery power:** If you are using a battery kit, attach the battery case to the holder, connect the DC cable from the battery case to the light body, and insert the correct batteries.
      
      If using the **NP-F battery kit**, two NP-F batteries must be used together. Single-battery use is not supported. After power is connected, flip the **power switch** to **ON** to start the light. Flip it to **OFF** when done.

  - title: Setting brightness
    images: []
    body: |
      - Rotate the **DIM/MODE** knob to adjust brightness.
      - The brightness range is **0% to 100%**.
      - Turn one direction to reduce brightness and the other direction to increase brightness.
      - Use lower brightness first when setting up, then raise it gradually once the light is aimed correctly.

  - title: Setting color temperature (CCT mode)
    images: []
    body: |
      - Press the **DIM/MODE** button briefly to switch modes until the display shows **CCT**.
      - In **CCT mode**, rotating the **FN** knob adjusts the **color temperature**.
      - The color temperature range is approximately **2800K to 6500K**.
      - Rotating the **DIM/MODE** knob in this mode adjusts **brightness**.
      
      This mode is used when you want to match warm indoor lighting or cooler daylight.

  - title: Using FX mode
    images: []
    body: |
      - Press the **DIM/MODE** button briefly until the display shows **FX**.
      - In **FX mode**, rotate the **DIM/MODE** knob to choose the lighting effect.
      - The built-in FX effects include **Flash**, **Lightning**, **Cloudy**, **Broken Bulb**, **TV**, **Candle**, **Fire**, **Fireworks**, **Explosion**, **Welding**, and **SOS**.
      - After choosing an FX effect, press the **FN** button to adjust that effect’s parameter.
      - In FX mode, the brightness range is still **0% to 100%**.

  - title: Bluetooth app control
    images: []
    body: |
      - Press the **FN** button to enter the Bluetooth settings.
      - Rotate the **DIM/MODE** knob to choose **Bluetooth On**, **Bluetooth Off**, or **Bluetooth Reset**.
      - When Bluetooth is turned on, you can connect the light to the **Godox Light** app.
      - If the app cannot find the light, choose **Bluetooth Reset**, then confirm the reset and try pairing again.
      - Use app control when you want to adjust the light remotely without touching the stand.

  - title: Battery and temperature warnings
    images: []
    body: |
      - When battery power becomes low, the display will show a **low battery symbol**.
      - When the light becomes too hot, the display will show a **high temperature warning**.
      - If the light temperature rises further, the unit may automatically reduce brightness to protect itself.
      - Keep the vents clear and let the light cool before packing it away.

  - title: Output and practical use
    images: []
    body: |
      - The light is brighter when used with the included **reflector** than when used bare.
      - In general use, attach the reflector when you need stronger output and more direction.
      - Use the bare light or add diffusion when you want a softer look.
      - Because this is a bi-color light, you can quickly match a wide range of indoor and outdoor lighting situations from the light itself.

  - title: Packing up
    images: []
    body: |
      - Turn the brightness down first, then switch the light **OFF**.
      - Disconnect the power cable or remove the battery setup.
      - Let the light cool for a short while before handling the front.
      - Remove the reflector, then place the **lamp head protective cover** back on the front of the light.
      - Fold or remove the holder/bracket if needed, place the light and accessories back into the **carry bag**, and make sure the adapter and cables are packed neatly without sharp bends.

  - title: Care and handling
    images: []
    body: |
      - Do not block the fan or air vents during use.
      - Do not store the light while it is still hot.
      - Keep the front COB area covered when not in use.
      - Coil cables loosely instead of tightly to reduce wear.
      - If using battery kits, remove batteries before long-term storage.

  - title: Quick troubleshooting
    images: []
    body: |
      **Light will not turn on:** Check the power switch, confirm the DC cable is fully inserted, and make sure the adapter or battery kit is connected properly.
      **Battery setup is not working:** If using the NP-F battery kit, confirm that two NP-F batteries are installed, not just one.
      **Cannot control from app:** Turn Bluetooth on in the light menu, then try a Bluetooth reset if needed.
      **Light becomes dimmer by itself:** Check for a high temperature warning, because the light may be reducing output to protect itself.
---
id: light_manfrotto_croma2
name: Manfrotto CROMA2 LED Light
brand: Manfrotto
category: Light
quantity: 2
storage: "4"

coverImages:
  - images/equipment/light_manfrotto_croma2_cover.avif

description: |
  A compact, bi-color LED panel designed for on-camera or stand-mounted use, with adjustable brightness and adjustable color temperature.

sections:
  - title: Setup
    images:
      - images/equipment/light_manfrotto_croma2_side.avif
      - images/equipment/light_manfrotto_croma2_back.avif
    body: |
      **Step 1:** Mount the light securely (see Mounting).
      **Step 2:** Choose a power method (AC adapter, Sony L-type battery, or AA batteries).
      **Step 3:** Turn the light **ON**.
      **Step 4:** Set **brightness** first, then adjust **color temperature** to match your environment.
      **Step 5:** If the light looks harsh, attach the **diffuser**.

  - title: Controls
    images:
      - images/equipment/light_manfrotto_croma2_side.avif
    body: |
      **Brightness dial:** Adjusts output from **1% to 100%**.
      **Color temperature dial:** Shifts the light from a warmer look (lower number) to a cooler daylight look (higher number).
      **ON/OFF:** Use the power control to switch the unit on and off.

  - title: Power options
    images:
      - images/equipment/light_manfrotto_croma2_back.avif
    body: |
      This light is designed to run from multiple power sources depending on what you have available.

      **Option A: AC adapter (recommended indoors)**
      • Connect a compatible **12V DC** power adapter to the DC input.
      • Ensure the connector is fully seated before switching on.

      **Option B: Sony L-type (NP-F style) battery**
      • Slide the battery onto the rear battery mount until it locks.
      • To remove, press the battery release (on the battery) and slide it off.

      A simple **color indicator (green / amber / red)** shows power status at a glance.

  - title: Diffuser (soften the light)
    images:
      - images/equipment/light_manfrotto_croma2_diffuser.avif
    body: |
      **What it does:** The diffuser makes the light softer and reduces harsh shadows.
      **How to use it:** Attach the diffuser securely on the front, then re-check your brightness because diffusion reduces output.
      **Handling:** Keep the diffuser clean and stored flat to avoid scratches and warping.

  - title: Output and coverage
    images: []
    body: |
      **Light spread:** Approximately **50°** beam angle.
      **Brightness reference (at 1 m):** About **810 lux at 5600K** and about **700 lux at 3300K**.
      **What this means in practice:** At close range, it can act as a key or fill light; further away, it becomes more of a gentle fill.

  - title: Packing, transport, and storage
    images: []
    body: |
      **Before packing:** Turn the light off, remove the battery, and disconnect any power cable.
      **Transport:** If the light is on a stand, remove it from the stand before moving long distances to reduce the chance of it falling.
      **Storage environment:** Avoid leaving it in high heat (for example, inside a parked car in the sun).
