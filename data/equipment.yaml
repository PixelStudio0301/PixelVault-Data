id: cam_canon_xf605
name: Canon XF605
brand: Canon
category: Camera
quantity: 1
storage: "A"

# cover images for the carousel
coverImages:
  - images/equipment/cam_canon_xf605_cover.avif

# collapsible sections
sections:
  - title: Powering the Camera
    images:
      - images/equipment/cam_canon_xf605_back.avif
    body: |
      **Battery (BP-A30 / BP-A60)**
      • Turn the camera off before inserting or removing a battery.
      • Insert the battery fully into the battery compartment located at the back and press it gently down until it clicks.
      • To remove it, hold down **BATTERY RELEASE**, slide the battery upwards, and pull it out.

      **Wall Power (DC IN)**
      • You can power the camera from a power outlet using a compatible Canon power adapter; when wall power is connected, the camera will not draw power from the battery.

  - title: LCD Screen and Touch Controls
    images: []
    body: |
      **Adjusting the LCD**
      • Open the LCD monitor outward and rotate it to the angle you need; you can also turn it to face your subject.

      **Direct Touch Control Interface (Quick Settings)**
      • In CAMERA mode, tap the on-screen touch button to open the direct touch control interface.
      • Tap **X** to close the interface.
      • You can still record and use menus while the interface is open.

  - title: SD Cards
    images:
      - images/equipment/cam_canon_xf605_back.avif
    body: |
      The SD card slots are located at the back of the camera, to the left of the battery compartment.

      **Insert / Remove SD Cards**
      • Wait until the SD card access indicator is **off** or **green** before opening the card compartment cover.
      • Insert the card straight until it clicks, with the **label facing the side of the operation buttons**.
      • To remove, make sure the indicator is off, push the card once to release it, then pull it out.

      **Initialize (Format) a Card**
      • Initialize cards when using them with this camera for the first time, or when you need to fully erase a card.
      • Go to **MENU > [Æ Recording/Media Setup] > [Initialize Media]**, select the card, then select **[OK]**.

      **Switch Which Card Slot You Record/Play Back From**
      • If both slots have cards, press **SLOT SELECT** to switch the selected card (you cannot switch while recording or playing back).

  - title: Recording Video
    images:
      - images/equipment/cam_canon_xf605_top.avif
    body: |
      **Start/Stop Recording**
      • Confirm you are in *CAMERA mode* (shooting).
      • Press the **REC** button to begin recording; the tally lamp lights and the on-screen indicator changes from **[STBY]** to **[ÜREC]**.
      • Press **REC** again to stop; the camera returns to standby and the tally lamp turns off.

      **Optional: On-Screen REC/STBY Buttons**
      • If enabled, you can start/stop recording using the on-screen **[ÜREC] / [STBY]** touch buttons.

  - title: Infrared Recording (IR)
    images:
      - images/equipment/cam_canon_xf605_left.avif
    body: |
      **Turning infrared recording on/off**
      • Set the **INFRARED** switch to **ON** to enter infrared mode.
      • Indicators will appear on-screen to show infrared is active.
      • Set the **INFRARED** switch back to **OFF** to return to normal shooting.

      **Choosing the infrared recording color (white or green)**
      • Go to **MENU > Camera Setup > IR Rec Color**.
      • Select the desired option (commonly **White** or **Green**).

      **Turning the infrared light on/off**
      • Go to **MENU > Camera Setup > IR Light**.
      • Select the desired option.
      • If your menu includes a **Toggle** option, you can set an assignable button to **IR Light** so you can switch it on/off quickly while filming.

  - title: Review and Playback (MEDIA Mode)
    images: []
    body: |
      **Switch to Playback**
      • Press the **MEDIA** button to toggle between *CAMERA mode* (shooting) and *MEDIA mode* (playback).

      **Index Screen Basics**
      • In MEDIA mode, clip thumbnails appear in an index screen.
      • Use the joystick to move the selection frame; you can also flick up/down on the LCD to change pages.
      • If both card slots have cards, press **SLOT SELECT** to view clips from the other card.

      **Quick Check: Review the Last Clip (Without Leaving CAMERA Mode)**
      • Use the **u (review recording)** button to review part or all of the last recorded clip (as available).

  - title: Using the Menus
    images: []
    body: |
      **Open and Navigate**
      • Press **MENU** to open the menu, and press **MENU** again to close it.
      • Use the joystick to move the selection frame; press the joystick to confirm a selection (this is equivalent to pressing **SET** in the manual).
      • Press **CANCEL** to go back one level or stop an operation in progress.
      • You can also tap menu icons, pages, and options on the touch screen.

      **My Menu (Your Shortlist)**
      • In CAMERA mode, you can register frequently used settings to **[¥ My Menu]** for faster access.
      • Add items via **[¥ My Menu] > [Edit] > [Register]**, then select the setting and confirm.

  - title: Audio
    images:
      - images/equipment/cam_canon_xf605_right.avif
    body: |
      **Where to Plug In**
      • **INPUT 1 / INPUT 2 (XLR):** Use these for XLR microphones or other professional audio sources.
      • **MIC terminal (3.5mm):** Use this for 3.5mm microphones.

      **Choose the Active Inputs**
      • Use the **INPUT 1/INPUT 2 (audio input selection) switch** to select which input sources are being recorded.

      **Set Audio Level to Auto or Manual (CH1 / CH2)**
      • Set the channel's audio level switch to **A** for automatic level adjustment.
      • Set it to **M** for manual, then turn the matching **audio level dial** to adjust the level.

      **Tip: Use Headphones When Setting Levels**
      • Monitoring with headphones makes it easier to notice distortion or other problems while adjusting levels.

  - title: Locking Controls
    images: []
    body: |
      **Key Lock**
      • Use the **KEY LOCK** switch (or the handle REC button lock lever) to prevent accidental button presses.
      • When key lock is active, some controls still work, including the **REC** button and the lens rings (focus, zoom, iris).

  - title: Useful Ports
    images: []
    body: |
      • **HDMI OUT:** Connect to an external monitor or recorder.
      • **SDI OUT:** Connect to SDI-compatible monitors/recorders and broadcast gear.
      • **USB Type-C:** Used for supported USB functions and connections.
      • **Ethernet:** Used for supported network functions.
      • **TIME CODE / G-LOCK/SYNC:** Used for supported timecode/sync workflows when required by a production setup.

