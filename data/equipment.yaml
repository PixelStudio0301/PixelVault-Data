# high‑level description shown in an "About" section
description: |
  The Sony A7 III is a versatile full-frame hybrid camera suitable for both photography and 4K video recording. It features a 24.2MP sensor and is widely used for interviews, events, and documentary filmmaking.

# collapsible sections
sections:
  - title: Intalling the Battery
    images:
      - images/equipment/cam_sony_a73_battery1.avif
      - images/equipment/cam_sony_a73_battery2.avif
    body: |
      **Battery (NP-FZ100)**
      • The battery compartment is on the bottom left of the grip. Twist the lock handle and pull to open the compartment.
      • Insert the battery with the contacts going in first. Push the compartment back in and twist the lock handle to secure it.

  - title: Intalling the Memory Cards
    images:
      - images/equipment/cam_sony_a73_memory.avif
    body: |
      **Memory Cards (Dual Slots)**
      • The media door is on the right side of the camera. Slide the cover back to open.
      • **Slot 1 (Bottom):** Supports UHS-II cards (faster). Use this for 4K video recording.
      • **Slot 2 (Top):** Supports UHS-I cards. 
      • **Orientation:** Insert SD cards with the metal contacts facing towards the lens (front of camera).
      • **Formatting:** Go to **MENU > Setup (Toolbox icon) > [Format]**. Select the slot to format.

  - title: Exposure Settings
    images: []
    body: |
      **Mode Dial**
      • Set the Mode Dial on top of the camera to the **Movie** icon (film strip) for video recording.

      **Shutter Speed**
      • Located on the rear dial (top right, back). Turn left/right to adjust.

      **Aperture (Iris)**
      • Located on the front dial (below the shutter button). Turn to adjust.

      **ISO**
      • Press the **ISO** side of the control wheel (right side).
      • Use the wheel to scroll to the desired value.

  - title: Exposure Tools
    images:
      - images/equipment/cam_sony_a73_settings.avif
    body: |
      **Histogram**
      • Press the **DISP** (Display Setting) button on the control wheel repeatedly until the histogram graph appears on the screen.

      **Zebra Stripes**
      • Go to **MENU > Camera Settings 2 (Camera icon) > [Zebra Setting]**.
      • Set **Zebra Display** to **On**.
      • Adjust the threshold in **Zebra Level**.

  - title: Audio Setup
    images: []
    body: |
      **Connecting Microphones**
      • **3.5mm Jack:** Open the microphone jack cover (red) on the left side of the camera. Connect your external microphone here.
      • **XLR Adapter (Optional):** If using an XLR adapter (like the XLR-K3M), slide it into the Multi Interface Shoe on top and tighten the lock.

      **Monitoring Audio**
      • Connect headphones to the **Headphone Jack** (black) located below the microphone jack on the left side.
      • To adjust recording volume: **MENU > Camera Settings 2 (Purple Camera icon) > [Audio Rec Level]**.

  - title: Important Buttons & Ports
    images: []
    body: |
      • **REC Button:** Small red button located near the viewfinder on the back right side.
      • **C1 / C2 Buttons:** Custom buttons near the shutter release, often customizable for quick access to specific settings like White Balance or Focus Area.
      • **AF-ON Button:** Located on the back, useful for back-button autofocus.
      • **HDMI:** Micro HDMI (Type-D) port on the left side for external monitors.

