# high‑level description
description: |
  The Zoom F8 is a professional multi-track field recorder with 8 XLR/TRS combo inputs. It supports high-resolution audio recording, timecode, and dual SD card slots for backup.

# collapsible sections
sections:
  - title: Installing Batteries
    images:
      - images/equipment/audio_zoom_f8_battery1.avif
      - images/equipment/audio_zoom_f8_battery2.avif
      - images/equipment/audio_zoom_f8_battery3.avif

    body: |
      **Batteries (8x AA)**
      • Locate the battery compartment on the rear panel. Loosen the thumb screw to open the door.
      • Pull out the battery sled and insert 8 AA batteries. Ensure correct polarity.
      • Reinsert the sled and tighten the screw to lock the door.

      **Power Cord**
      • Alternatively, you can also power the unit via the 12V AC adapter.

  - title: Installing SD Cards
    images:
      - images/equipment/audio_zoom_f8_memory.avif
    body: |
      **SD Cards (Dual Slots):**
      • Open the media door on the left side of the unit.
      • Insert SD cards into **Slot 1** and/or **Slot 2** with the label facing up.
      • **Formatting:** Press **MENU** > **SD CARD** > **Format**. Select the card slot to format.

  - title: Connecting Inputs
    images:
      - images/equipment/audio_zoom_f8_input.avif
    body: |
      **XLR/TRS Inputs**
      • Connect microphones or line-level sources to Inputs 1-8 on the side panels.

      **Headphones**
      • Connect headphones into the headphone jack port located on the right side panel.

      **Phantom Power (+48V)**
      • If using a condenser mic, go to **MENU** > **INPUT** > **Phantom**.
      • Set **On/Off** to **On** for the specific track you are using.

  - title: Adjusting Levels
    images:
      - images/equipment/audio_zoom_f8_settings.avif
    body: |
      **Arming Tracks**
      • Press the track number buttons (1-8) corresponding to the connected inputs on the front panel.
      • **Red LED:** Track is armed for recording.
      • **Off:** Track is disarmed.

      **Adjusting Gain (Trim)**
      • Turn the corresponding **Gain Knob** for the armed track.
      • Adjust until the level meter on the LCD screen peaks between -12dB and -6dB.

      **Headphone Volume**
      • Use the small volume knob next to the bottom right of the screen.

  - title: Recording Controls
    images:
      - images/equipment/audio_zoom_f8_settings.avif
    body: |
      • **Start Recording:** Press the **REC** button (with red circle). The LED ring will glow red.
      • **Stop Recording:** Press the **STOP** button (square icon).
      • **Play/Pause:** Press the **PLAY/PAUSE** button to review the last take.
      • **Slate Mic:** Push the switch above the MENU button to the left to activate the built-in slate mic for voice notes.

