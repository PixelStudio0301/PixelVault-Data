      This is a **cinema-style prime** lens. It has a fixed focal length of **24mm** and a very wide aperture of **T1.5**, which is an aperture number used on many cinema lenses. Cinema lenses are often designed for smooth manual control and consistent results between lenses.

  - title: What it is best used for
    images: []
    body: |
      This lens is great for **cinematic wide shots**, **interiors**, **walk-and-talk scenes**, and **low-light filming** where you still want a wide view. 24mm also works well for establishing shots that are wide but still keep the subject feeling close and present.

  - title: How to use it well
    images: []
    body: |
      If you use T1.5, keep focus attention on what matters most, because the sharp focus zone can be thin, especially close-up. For more reliable focus, consider stopping down slightly when possible, especially if the subject moves.

      Keep the camera level for architecture and interiors to avoid accidental leaning lines. Use the wide view to show context, but avoid clutter by choosing clean backgrounds and clear subject placement.

  - title: Common mistakes to avoid
    images: []
    body: |
      - Avoid standing extremely close to faces at 24mm if facial features start to look stretched.
      - Avoid shooting wide open in scenes with lots of movement unless you have a plan to hold focus.
      - Avoid messy frame edges; wide lenses make unwanted objects easy to miss.
