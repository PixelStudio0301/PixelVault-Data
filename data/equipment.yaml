# high‑level description shown in an "About" section
description: |
  The Sony FX3 is a compact, full-frame Cinema Line camera designed for solo shooters. It features a 12MP sensor optimized for 4K video, excellent low-light performance, and pro-grade audio inputs.

# collapsible sections
sections:
  - title: Intalling the Battery
    images:
      - images/equipment/cam_sony_fx3_bottom.avif
      - images/equipment/cam_sony_fx3_battery.avif
    body: |
      **Battery (NP-FZ100)**
      • The battery compartment is on the bottom of the grip. Slide the switch to open.
      • Insert the battery with the contacts going in first. Push until the blue lever clicks it into place.

  - title: Intalling the Memory Cards
    images:
      - images/equipment/cam_sony_fx3_memory.avif
    body: |
      **Memory Cards (Dual Slots)**
      • The media door is on the right side of the camera. Slide the latch down to open.
      • **Slot 1** is on the Top. **Slot 2** is on the Bottom.
      • **Orientation:**
        - **SD Cards:** Insert with the metal contacts facing the LCD screen.         
        - **CFexpress Type A:** Insert with the label facing the LCD screen.
      • **Formatting:** Before shooting, go to **MENU > Shooting > Media > Format** to clear the card.

  - title: Checking Exposure Using the Histogram
    images: []
    body: |
      • Press the **DISP** (Display) button on the rear control wheel repeatedly until a graph appears in the bottom right corner.

  - title: Audio Setup (Mics & Headphones)
    images: []
    body: |
      **Connecting Microphones**
      • **3.5mm Jack:** Use the red microphone jack on the side of the body for on-camera mics like the RODE VideoMic.
      • **XLR Handle:** For professional audio, slide the handle unit into the top Multi-Interface Shoe and tighten the two screws.
        - Connect XLR cables to Input 1 or 2.
        - Set the **HANDLE AUDIO** switch to **ON**.
        - Set **+48V** switch to **ON** if using a condenser mic (Phantom Power).

      **Monitoring Audio:**
      • Connect headphones to the **Black Headphone Jack** on the side of the camera body.
      • Always listen to ensure there is no wind noise or distortion before recording.

  - title: Important Buttons & Ports
    images: []
    body: |
      • **MODE Button:** Press the 'MODE' button on the back to switch between Movie, S&Q (Slow & Quick), and Photo modes.
      • **REC Buttons:** There are record buttons on the top, front, and on the XLR handle. The Tally Lamps (red lights) will glow when recording.
      • **HDMI:** Uses a full-size HDMI Type-A port for connecting to external monitors.

