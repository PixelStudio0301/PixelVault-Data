id: cam_canon_hfg70
name: Canon LEGRIA HF G70
brand: Canon
category: Camera
quantity: 1
storage: "A"

# cover images for the carousel
coverImages:
  - images/equipment/cam_canon_hfg70_cover.avif

# high-level description shown in an "About" section
description: |
  The Canon LEGRIA HF G70 is a compact 4K camcorder with dual SD card slots, a built-in zoom lens, and touch-screen controls.

# collapsible sections
sections:
  - title: Power On, Modes, and Basic Recording
    images:
      - images/equipment/cam_canon_hfg70_left.avif
    body: |
      **Power switch (CAMERA / MEDIA / OFF)**
      • Set the power switch to **CAMERA** to record.
      • Set the power switch to **MEDIA** to review clips and photos.
      • Set the power switch to **OFF** when done.

      **Record video**
      • In **CAMERA** mode, press **START/STOP** to begin recording.
      • Press **START/STOP** again to stop recording.

      **Quick review of the last clip**
      • After recording, press the **u** button to review the last few seconds of the most recent clip without switching to MEDIA mode.

  - title: Battery and Charging
    images:
      - images/equipment/cam_canon_hfg70_back.avif
    body: |
      **Compatible batteries**
      • Use Canon **BP-820** or **BP-828** battery packs.

      **Attach the battery**
      • Align the battery with the battery compartment at the back of the camera and slide it in until it clicks into place.

      **Remove the battery**
      • Turn the camcorder off, then slide the **BATT. release** switch in the direction of the arrow and pull the battery out.

  - title: SD Cards
    images:
      - images/equipment/cam_canon_hfg70_left.avif
    body: |
      **Insert SD cards (dual slots)**
      • Open the card slot cover and insert an SD card into **SD card A** and/or **SD card B**.
      • Insert the card in the correct direction and do not force it.

      **Switch the active recording card**
      • Use **[^] (Switch Card Slot)** on-screen when available to switch the SD card used for recording.

      **Format (initialize) an SD card**
      • Open the menu and go to **[B System Setup] > [Initialize Media]**.
      • Select **[SD Card A]** or **[SD Card B]**, then confirm to initialize (format) the card.

  - title: Video Settings
    images: []
    body: |
      **Set resolution and bit rate**
      • Go to **Menu > [Recording Setup] > [Resolution]**.
      • Select the option you want, then select **[X]** to apply. The selected resolution and bit rate will appear at the right of the screen.

      **Set frame rate**
      • Go to **Menu > [Recording Setup] > [Frame Rate]**.
      • Select the option you want, then select **[X]** to apply. The icon of the selected frame rate will appear at the right of the screen.

      **Note about available options**
      • Available resolution/bit rate options depend on the current frame rate, and the camcorder uses a variable bit rate (VBR).

  - title: Zooming In and Out
    images:
      - images/equipment/cam_canon_hfg70_top.avif
    body: |
      **Zoom rocker (main zoom control)**
      • Use the zoom rocker on the grip located to the right of the viewfinder: press toward **T** to zoom in (closer) and toward **W** to zoom out (wider).
      • Press lightly for a slower zoom and press further for a faster zoom.

      **Focus/Zoom ring (front ring)**
      • If your camcorder is set up to use the ring for zoom, rotate the ring to zoom smoothly.

      **Touch-screen zoom**
      • Use the on-screen zoom controls (zoom bar/buttons) to zoom if you want a slower, more controlled zoom without using the rocker.

  - title: Focus Controls
    images: []
    body: |
      **Autofocus (AF)**
      • Use autofocus for general shooting and fast-moving situations.

      **Manual focus (MF)**
      • Switch to manual focus when autofocus struggles (for example, through glass, low light, or a busy background).
      • Use the focus ring/dial controls (depending on your setup) to adjust focus until the subject looks sharp.

      **Tip for checking focus**
      • If your shot allows it, zoom in to confirm focus, then zoom back out to your framing.

  - title: Exposure Settings
    images: []
    body: |
      **Choose a shooting mode (how much you control)**
      • Select a shooting mode that matches how much control you need (for example: a fully automatic mode for fast setup, or a manual mode when you want to set values yourself).

      **Adjust exposure manually**
      • Use the exposure controls available in your selected shooting mode to adjust **aperture**, **shutter speed**, and **gain** (the camera's sensitivity setting).

      **Exposure compensation (make the image brighter/darker quickly)**
      • When available, use exposure compensation to shift brightness without fully switching to manual settings.

  - title: Exposure Tools (Zebra and ND Filter)
    images: []
    body: |
      **Zebra stripes (highlight warning)**
      • Go to **[Camera Setup] > [Zebra]**.
      • Turn zebra **On**, then set the zebra **level** (commonly **70%** or **100%**) depending on what you want to check.

      **ND filter (reduce light without changing other settings)**
      • Go to **[Camera Setup] > [ND Filter]**.
      • Select the desired option (including **Automatic**, if available for your situation).

  - title: White Balance
    images: []
    body: |
      **Set white balance**
      • Open the function/settings menu and select **[White Balance]**.
      • Choose a preset that matches the lighting, or set a custom white balance when you need the most accurate color.

  - title: Image Stabilization
    images: []
    body: |
      **Turn stabilization on/off**
      • Open the camera settings and find **Image Stabilization**.
      • Select the stabilization mode you want (for example, a stronger mode for walking shots, or a standard mode for general handheld shooting), or turn it off when using a tripod.

  - title: Audio Setup and Audio Levels
    images: []
    body: |
      **Connect a microphone**
      • Plug your microphone into the camcorder's microphone input if you are using an external mic.

      **Adjust recording level**
      • Open the audio settings and adjust **Audio Level** so voices are clear and the meter is not constantly hitting the maximum.

      **Monitor audio**
      • Use headphones if your setup supports it, so you can catch issues like crackling, wind noise, or a loose cable during recording.

  - title: Playback and Reviewing Footage
    images: []
    body: |
      **Play back clips**
      • Switch the power switch to **MEDIA** to enter playback.
      • Tap a clip thumbnail to start playback, and tap the screen to show playback controls.
