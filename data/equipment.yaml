# high‑level description
description: |
  The DJI Osmo Pocket 3 is a handheld gimbal camera featuring a 1-inch CMOS sensor. It records up to 4K/120fps video and features a 2-inch rotatable touchscreen for quick switching between horizontal and vertical shooting.

# collapsible sections
sections:
  - title: Powering On/Off
    images: []
    body: |
      **Power On:**
      • Rotate the touchscreen clockwise to power on.
      • Alternatively, press the **Shutter/Record** button.

      **Power Off:**
      • Rotate the touchscreen counter-clockwise.
      • Or, press and hold the **Shutter/Record** button.

  - title: Touchscreen Controls
    images: []
    body: |
      **Main View:**
      • **Swipe Down:** Access Control Menu (Settings, rotate screen, brightness).
      • **Swipe Up:** Access resolution and frame rate settings.
      • **Swipe Left:** Switch shooting modes (Photo, Video, Low Light, Slow Motion).
      • **Swipe Right:** View playback album.

      **Gimbal Control:**
      • Double-tap a subject on screen to activate **ActiveTrack**.
      • Tap the **Gimbal Mode** icon on the right to switch modes (Follow, Tilt Locked, FPV).

  - title: Recording & Storage
    images: []
    body: |
      **Recording:**
      • Press the red **Shutter/Record** button to start/stop video or take a photo.

      **Storage (MicroSD):**
      • The slot is located on the left side of the handle.
      • Insert the card with the logo facing the touchscreen.
      • **Formatting:** Swipe down > Settings (Gear icon) > Format.

  - title: Charging & Handles
    images:
      - images/equipment/cam_osmo_pocket_3_battery.avif
      - images/equipment/cam_osmo_pocket_3_tripod.avif
    body: |
      **Charging:**
      • Connect a USB-C cable to the port at the bottom of the handle. 

      **Battery Handle (Optional):**
      • To extend runtime, attach the Battery Handle to the USB-C port on the bottom.
      • Ensure the release button clicks to lock it in place. Press the button to release.

      **Tripod Handle (Optional):**
      • To extend the camera's height, screw the Tripod Handle to the bottom of the Battery Handle.
      • The handle can be unfurled into tripod legs allowing the camera to stand on its own.

