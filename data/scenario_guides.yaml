id: live_streaming
name: Live Streaming
coverImages:
  - assets/images/scenarios/live_streaming_cover.avif
sections:
  - title: Goal of this setup
    images: []
    body: |
      The goal of a live streaming setup is to produce a stable, professional-looking video feed with clear audio and minimal risk of failure. The priorities are reliable power, stable internet, consistent exposure and color, clean audio monitoring, and a simple workflow that is easy to operate under pressure.

  - title: Recommended equipment
    images: []
    body: |
      **2 cameras (at least):** Use two cameras at least, one as the main angle and one as a backup or wide angle. This lets you switch angles for variety and gives you a safety option if one feed fails.
      
      **Tripods:** Use stable tripods for both cameras so framing does not drift during the stream.
      
      **Capture device / switcher:** Use a capture card or video switcher to bring camera video into a computer and to switch between cameras cleanly.
      
      **Computer:** Use a reliable computer to run the streaming software and handle encoding.
      
      **Microphone:** Use a lav mic, handheld mic, or shotgun mic depending on the event, because built-in camera mics are rarely good enough for speech.
      
      **Audio interface / camera XLR inputs (if available):** Use proper inputs and level controls to keep audio clean and consistent.
      
      **Headphones:** Monitor audio continuously so you catch problems immediately.
      
      **Lights:** Use at least one controllable light (amaran 200x S, Felloni, or CROMA2) so exposure stays consistent even if room lighting changes.
      
      **Power:** Use AC power for cameras, computer, and lights whenever possible to avoid battery failures mid-stream.
      
      **Cables and spares:** Bring spare HDMI/SDI cables, power adapters, and one extra audio cable, because cable failures are common.

  - title: Choose your streaming layout (simple vs. multi-angle)
    images: []
    body: |
      **Single-camera stream:** Simplest and most reliable, best when you have limited crew or time.
      
      **Multi-camera stream:** More professional and flexible, best for interviews, panels, demonstrations, and events where switching angles improves clarity.
      
      If you use two cameras, plan which ones are the main shots and which ones are the wide/backup shots, then keep the switching simple.

  - title: Camera setup
    images: []
    body: |
      **A-Cam (main):** Use the camera angle that will be on screen most of the time, usually a medium or medium close-up for a host or speaker.
      
      **B-Cam (wide/backup):** Use a wider angle that shows the full scene or provides a safety shot if the main angle has an issue.
      
      Keep both cameras on tripods, and ensure both are framed with stable headroom and look room. If you are switching live, keep both cameras on the same side of the subject’s eye-line so gaze direction remains consistent.

  - title: Match settings across cameras
    images: []
    body: |
      Set both cameras to the same **resolution** and **frame rate** to prevent sync and switching issues.
      
      Set a fixed **white balance** on both cameras instead of auto so color does not drift during the stream.
      
      Lock exposure settings so brightness does not jump mid-stream. If your cameras support exposure aids (zebra/histogram), use them during setup, then keep settings locked for the live session.

  - title: Connecting video to the computer 
    images: []
    body: |
      **Option A: Direct capture (one camera):** Camera HDMI/SDI output goes into a capture device, then into the computer.
      **Option B: Switcher (two cameras):** Both cameras go into a switcher, then the switcher outputs a single feed into the computer.
      
      Keep cables secured and avoid loose connectors, because live streams often fail due to accidental cable pulls. If you have long cable runs, use the most reliable connection type available and test for dropouts before going live.

  - title: Streaming software setup
    images: []
    body: |
      Set up a scene for your main camera feed and a second scene or input for the wide/backup camera.
      
      Add audio input and confirm the correct device is selected.
      
      Add any graphics only after the video and audio are confirmed stable, because extra overlays increase complexity.
      
      Do a full-screen preview check for framing, background distractions, and exposure before going live.

  - title: Audio setup
    images: []
    body: |
      Choose one primary microphone and prioritize clarity over convenience. If possible, use a lav mic on the speaker for consistent level even when they turn their head.
      
      Set audio level so it is strong but not distorting, and confirm levels by speaking at the loudest expected volume. Monitor with headphones throughout the stream and listen for crackles, hum, or sudden level changes.
      
      If you can, record a local backup audio track or ensure the camera records audio internally as a safety.

  - title: Lighting for streaming
    images: []
    body: |
      Use at least one controlled light so the face remains consistent even if the room lights flicker or change.
      
      If using amaran 200x S, use the umbrella/diffusion setup for a softer look and fewer harsh shadows.
      
      If using panel lights like Felloni or CROMA2, position them slightly to one side and slightly above eye level.
      
      Keep lighting consistent and avoid relying on windows, because daylight changes during a long stream.

  - title: Internet and stream stability
    images: []
    body: |
      Use a wired Ethernet connection whenever possible because it is more stable than Wi-Fi.
      
      If you must use Wi-Fi, position close to the router and avoid crowded networks.
      
      Run a speed test and choose stream settings that your upload speed can sustain with margin.
      
      If the internet is unstable, lower the stream bitrate or resolution rather than risking dropouts.

  - title: Power and backup planning
    images: []
    body: |
      Use AC power for cameras and lights to prevent battery shutdowns. If AC power is not available, start with fully charged batteries and have spares ready within reach.
      
      Secure power bricks and adapters so they do not hang by the cable.
      
      If possible, record internally on the cameras even while streaming, so you still have a high-quality version if the stream glitches.

  - title: Pre-stream checklist
    images: []
    body: |
      1) Both cameras powered and stable on tripods.
      2) Same resolution, frame rate, and fixed white balance on both cameras.
      3) Video feed confirmed in the capture device/switcher and visible in the streaming software.
      4) Audio input selected correctly and levels tested at realistic volume.
      5) Headphone monitoring active.
      6) Lighting turned on and exposure confirmed.
      7) Internet connection tested and streaming settings set to a safe bitrate.
      8) A short private test stream recorded or previewed, then reviewed quickly.
      9) Cables taped down or routed safely to prevent accidental disconnection.

  - title: During the stream
    images: []
    body: |
      Keep switching simple and predictable, and avoid rapid camera changes unless you have a dedicated operator.
      
      Watch audio levels and listen for changes in background noise.
      
      If something fails, switch to the wide/backup camera, keep audio running, and fix the issue calmly.
      
      Keep a basic run sheet so you know when graphics, transitions, or camera changes should happen.

  - title: Common live streaming mistakes to avoid
    images: []
    body: |
      • Avoid relying on batteries for long streams unless you have a clear battery swap plan.
      • Avoid auto exposure and auto white balance, because the image can shift noticeably during the stream.
      • Avoid ignoring audio monitoring, because audio problems are harder to fix than minor video issues.
      • Avoid complex overlays and effects if you do not have time to test them properly.
      • Avoid Wi-Fi when a wired connection is possible, because stability is more important than convenience.

